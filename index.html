<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Football Fixtures</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .controls {
      text-align: center;
      margin-bottom: 20px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    .card {
      background: #1e293b;
      margin: 10px auto;
      padding: 15px;
      border-radius: 12px;
      max-width: 500px;
    }
  </style>
</head>
<body>

<h1>⚽ Football Fixtures</h1>

<div class="controls">
  <input type="date" id="dateInput" />
  <button onclick="getMatches()">Get Matches</button>
</div>

<div id="results"></div>

<script>
const API_KEY = "7f6fd035e5cb2cb22be0a1001915a7cd";

function getMatches() {
  const date = document.getElementById("dateInput").value;

  fetch(`https://v3.football.api-sports.io/fixtures?date=${date}`, {
    headers: {
      "x-apisports-key": API_KEY
    }
  })
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("results");
    container.innerHTML = "";

    if (!data.response.length) {
      container.innerHTML = "<p style='text-align:center'>No matches found</p>";
      return;
    }

    data.response.forEach(match => {
      const home = match.teams.home.name;
      const away = match.teams.away.name;
      const score = match.goals.home + " - " + match.goals.away;

      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <h3>${home} vs ${away}</h3>
        <p>Score: ${score ?? "N/A"}</p>
        <p>Status: ${match.fixture.status.long}</p>
      `;

      container.appendChild(div);
    });
  })
  .catch(err => console.log(err));
}
</script>

</body>
</html>/
