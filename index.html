<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esports Analytics Center</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0b0e14;
            color: #e2e8f0;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 850px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        header h1 {
            font-size: 2.5rem;
            color: #ff4655;
            margin-bottom: 0.5rem;
        }
        header p { color: #94a3b8; }
        .match-list {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
        .loading {
            text-align: center;
            color: #94a3b8;
            font-style: italic;
            padding: 3rem;
        }
        /* Analytics Scoreboard Card Layout */
        .match-card {
            background-color: #171c26;
            border: 1px solid #232a38;
            border-radius: 14px;
            padding: 1.5rem;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        .team {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .team.team-a { align-items: flex-end; text-align: right; }
        .team.team-b { align-items: flex-start; text-align: left; }
        
        .team-name {
            font-weight: 700;
            font-size: 1.2rem;
            color: #ffffff;
        }
        .winner-tag {
            font-size: 0.75rem;
            font-weight: bold;
            color: #22c55e;
            background-color: rgba(34, 197, 94, 0.1);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            display: inline-block;
        }
        /* Central Analytics Core */
        .match-details {
            text-align: center;
            padding: 0 2rem;
            min-width: 180px;
        }
        .game-tag {
            background-color: #ff4655;
            color: white;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            text-transform: uppercase;
        }
        .score-display {
            font-size: 1.8rem;
            font-weight: 800;
            color: #ffffff;
            margin: 0.4rem 0;
            letter-spacing: 2px;
        }
        .tournament-name {
            font-size: 0.8rem;
            color: #64748b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Esports Analytics Hub</h1>
            <p>Historical results and scoreboard metrics</p>
        </header>

        <main id="match-list" class="match-list">
            <div class="loading">Loading analytical score records...</div>
        </main>
    </div>

    <script>
        const API_URL = '/api/matches';

        async function fetchAnalytics() {
            const container = document.getElementById('match-list');
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Data broken");
                const data = await response.json();
                
                if (data.length === 0) {
                    container.innerHTML = '<div class="loading">No past analytics data available.</div>';
                    return;
                }
                
                container.innerHTML = '';
                data.forEach(match => {
                    // Inject styling flags to distinct who won the match directly
                    const tagA = match.winnerId === match.teamA_Id ? '<span class="winner-tag">🏆 WINNER</span>' : '';
                    const tagB = match.winnerId === match.teamB_Id ? '<span class="winner-tag">🏆 WINNER</span>' : '';

                    container.innerHTML += `
                        <div class="match-card">
                            <div class="team team-a">
                                <span class="team-name">${match.teamA}</span>
                                ${tagA}
                            </div>
                            
                            <div class="match-details">
                                <span class="game-tag">${match.game}</span>
                                <div class="score-display">${match.score}</div>
                                <div class="tournament-name">${match.tournament}</div>
                            </div>
                            
                            <div class="team team-b">
                                <span class="team-name">${match.teamB}</span>
                                ${tagB}
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                container.innerHTML = `
                    <div class="loading" style="color: #ff4655;">
                        <strong>Pipeline configuration issue.</strong><br> Ensure your environment variables are configured on your host portal.
                    </div>`;
            }
        }
        document.addEventListener('DOMContentLoaded', fetchAnalytics);
    </script>
</body>
</html>
